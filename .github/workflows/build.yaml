name: Build
on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build.yaml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build.yaml'

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goamd64: v1
            suffix: amd64
          - goos: linux
            goarch: "386"
            go386: sse2
            suffix: x86
          - goos: linux
            goarch: arm64
            goarm64: v8.0
            suffix: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: arm32
          - goos: linux
            goarch: riscv64
            goriscv64: rva20u64
            suffix: riscv64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.25'
      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o packman-${{ matrix.suffix }} ./...

      - run: go vet ./...
      - uses: actions/upload-artifact@v7
        with:
          name: packman
          path: packman
